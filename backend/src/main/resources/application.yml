server:
  port: 8787

spring:
  application:
    name: arb-monitor
  datasource:
    url: jdbc:h2:file:./data/arb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

arb:
  spread-push-ms: 3000
  volatility-push-ms: 3000
  exchanges:
    - bitget
    - gate
    - mexc
    - okx
  # RabbitMQ：true 时行情先入队再由消费者写入内存（削峰）；false 时采集直连内存（本地/无 Rabbit 时必须为 false）
  mq:
    enabled: false
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    queue: arb.depth.ticks
    prefetch: 200
    consumers: 1
  live:
    # true（推荐）：四所真实行情 WSS/REST；false：仅用内存模拟（离线/调试）
    enabled: true
    # api：四所 USDT 现货交易对交集（启动时拉取）；config：仅使用下方 symbols
    symbol-source: api
    # 仅 symbol-source=api 时生效；0=不限制（负载极高，慎用）
    max-symbols: 500
    subscribe-chunk-size: 60
    mexc-shard-size: 30
    symbols:
      - BTC_USDT
      - ETH_USDT
    # MEXC：true=官方 WSS + Protobuf 限价深度（推荐）；false=仅 REST 轮询（见 mexc-poll-ms）
    mexc-websocket-enabled: true
    mexc-ws-url: wss://wbs-api.mexc.com/ws
    # Gate 盘口推送间隔：20ms 比 100ms 更贴近实时（负载略高）
    gate-order-book-interval: "20ms"
    # MEXC REST 轮询间隔（仅 mexc-websocket-enabled=false 时生效；建议 250–500）
    mexc-poll-ms: 280
    reconnect-base-ms: 2000
