# 生产 / CD：仅使用镜像仓库中的镜像（不在服务器上 build）
# 服务器上用法：
#   export ARB_IMAGE=ghcr.io/<你的小写用户名>/arb-monitor:<git-sha 或 latest>
#   docker compose -f docker-compose.prod.yml up -d
#
# 或创建 .env：
#   ARB_IMAGE=ghcr.io/owner/arb-monitor:latest

name: arb

services:
  app:
    image: ${ARB_IMAGE}
    container_name: arb-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8787:8787"
      - "5672:5672"
      - "15672:15672"
    volumes:
      - arb_h2:/app/data
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      ARB_LIVE_ENABLED: ${ARB_LIVE_ENABLED:-true}
      ARB_MQ_ENABLED: ${ARB_MQ_ENABLED:-true}
      ARB_MQ_HOST: 127.0.0.1
      ARB_MQ_PORT: "5672"
      ARB_MQ_USERNAME: guest
      ARB_MQ_PASSWORD: guest
      # 须与下方 mysql 的库名、root 密码一致；默认库名 arb（与 MYSQL_DATABASE 一致），勿再用不存在的 sjfx / arb 账号
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/sjfx?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    networks:
      - arb
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - arb

  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: arb
    command: ["--character-set-server=utf8mb4","--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - arb
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

networks:
  arb:
    driver: bridge

volumes:
  mysql_data: {}
  rabbitmq_data: {}
  arb_h2: {}
